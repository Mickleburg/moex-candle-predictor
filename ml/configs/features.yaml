# Feature engineering configuration

# Tokenization
num_classes: 3  # K=3: down / neutral / up for SBER 1H research
horizon: 1  # Predict the next hourly candle

# Window configuration
window_size: 32  # Best validation macro-F1 in SBER 1H grid

# Technical indicators
indicators:
  returns:
    periods: [1, 3, 5]
  
  atr:
    period: 14
  
  rolling_volatility:
    window: 20
  
  volume_ratio:
    window: 20
  
  ema:
    periods: [9, 20, 50]
  
  candle_features:
    - "body"
    - "range"
    - "upper_wick"
    - "lower_wick"
    - "body_ratio"

# Time features
time_features:
  - "hour"
  - "day_of_week"
  - "month"

# Feature normalization (fit on train only)
normalization:
  method: "standard"  # standard, minmax, or none
